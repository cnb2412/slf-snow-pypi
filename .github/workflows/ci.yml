name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"] # bei Bedarf weitere Versionen ergaenzen
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Typecheck
        run: uv run mypy
      - name: Tests
        run: uv run pytest

  ci-success:
    # Matrix-unabhaengiger Pflicht-Check fuer die Branch-Protection (stabiler Name)
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Alle Matrix-Jobs erfolgreich?
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Job 'test' nicht erfolgreich: ${{ needs.test.result }}"
            exit 1
          fi
